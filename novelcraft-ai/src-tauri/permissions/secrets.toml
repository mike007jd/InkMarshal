"$schema" = "schemas/schema.json"

# High-risk: reads/writes/deletes API keys + BYOK credentials in the OS keychain
# (or the AES-256-GCM file fallback). Grouped so the secret surface is auditable
# at a glance. See default.toml for why this is organisation, not a runtime gate.
[[set]]
identifier = "secrets"
description = "Keychain secret read/write/delete."
permissions = [
  "allow-keychain-set",
  "allow-keychain-get",
  "allow-keychain-delete",
]
